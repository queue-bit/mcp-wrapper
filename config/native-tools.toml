# ---------------------------------------------------------------------------
# Native tools
# ---------------------------------------------------------------------------
# Native tools are HTTP-callable tools defined directly here.
# The wrapper executes the HTTP call itself — no downstream MCP server needed.
# The same enforcement pipeline applies (rules, DLP, rate limits, approvals).
# Reference native tools in rules-defaults.toml under the [__native__] section.
#
# credential_injection:
#   bearer  (default) — Authorization: Bearer <token>
#   header            — custom header; also set credential_header = "X-Api-Key"
#   query             — query parameter; also set credential_param = "api_key"
#
# param_placement:
#   query  (default) — arguments appended as URL query params
#   json             — arguments sent as JSON request body
#   path             — arguments interpolated into the URL via str.format(**arguments)
#
# static_params — operator-pinned values that agents cannot override.
